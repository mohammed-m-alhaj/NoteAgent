<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #0f172a;
            --bg-2: #1e293b;
            --card: rgba(15, 23, 42, 0.72);
            --line: rgba(148, 163, 184, 0.22);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #22d3ee;
            --accent-2: #34d399;
            --danger: #fb7185;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", sans-serif;
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
            background: radial-gradient(circle at 10% 20%, #1d4ed8 0%, transparent 35%),
                        radial-gradient(circle at 85% 15%, #0ea5e9 0%, transparent 30%),
                        linear-gradient(135deg, var(--bg-1), var(--bg-2));
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: -25%;
            background: conic-gradient(from 0deg, rgba(34, 211, 238, 0.14), rgba(52, 211, 153, 0.12), rgba(59, 130, 246, 0.12), rgba(34, 211, 238, 0.14));
            animation: spinAura 18s linear infinite;
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.16;
            z-index: -1;
            pointer-events: none;
        }

        .shell {
            width: min(760px, 100%);
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 28px;
            background: var(--card);
            backdrop-filter: blur(14px);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
            animation: riseIn 700ms ease-out both;
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(1.7rem, 3.5vw, 2.5rem);
            line-height: 1.15;
            letter-spacing: 0.4px;
        }

        .subtitle {
            margin: 0 0 18px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        textarea {
            width: 100%;
            min-height: 132px;
            max-height: 280px;
            resize: vertical;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(15, 23, 42, 0.55);
            color: var(--text);
            padding: 14px 15px;
            margin: 8px 0 14px;
            outline: none;
            transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
            font: inherit;
        }

        textarea::placeholder {
            color: #9ca3af;
        }

        textarea:focus {
            border-color: rgba(34, 211, 238, 0.7);
            box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.15);
            transform: translateY(-1px);
        }

        button {
            border: 0;
            border-radius: 12px;
            padding: 11px 18px;
            cursor: pointer;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            color: #06202a;
            font: inherit;
            font-weight: 700;
            letter-spacing: 0.2px;
            position: relative;
            overflow: hidden;
            transition: transform 160ms ease, filter 160ms ease;
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.06);
        }

        button:active {
            transform: translateY(1px) scale(0.99);
        }

        button[disabled] {
            opacity: 0.75;
            cursor: wait;
        }

        button::after {
            content: "";
            position: absolute;
            width: 36%;
            height: 220%;
            top: -60%;
            left: -45%;
            background: linear-gradient(110deg, transparent 30%, rgba(255, 255, 255, 0.34), transparent 70%);
            transform: rotate(10deg);
            animation: shimmer 2.8s ease-in-out infinite;
        }

        #response {
            margin-top: 18px;
            padding: 14px 15px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(2, 6, 23, 0.55);
            display: none;
            white-space: pre-wrap;
            animation: reveal 250ms ease-out both;
        }

        #response.loading {
            color: var(--muted);
        }

        #response.loading::after {
            content: "";
            display: inline-block;
            width: 18px;
            margin-left: 6px;
            text-align: left;
            animation: dots 1.1s steps(4, end) infinite;
        }

        .error {
            border-color: rgba(251, 113, 133, 0.65);
            color: #fecdd3;
            background: rgba(136, 19, 55, 0.23);
        }

        @keyframes riseIn {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes spinAura {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes reveal {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes dots {
            0% { content: ""; }
            25% { content: "."; }
            50% { content: ".."; }
            75% { content: "..."; }
            100% { content: ""; }
        }

        @keyframes shimmer {
            0% { left: -45%; }
            60%, 100% { left: 120%; }
        }

        @media (max-width: 600px) {
            .shell {
                border-radius: 18px;
                padding: 20px;
            }

            h1 {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <h1>Note Agent</h1>
        <p class="subtitle">Write a prompt, send it, and get the assistant response with a smooth UI flow.</p>

        <form id="agentForm">
            <textarea id="prompt" placeholder="Enter your prompt..." required></textarea>
            <button id="sendBtn" type="submit">Send</button>
        </form>

        <div id="response"></div>
    </main>

    <script>
        const form = document.getElementById('agentForm');
        const promptInput = document.getElementById('prompt');
        const responseDiv = document.getElementById('response');
        const sendBtn = document.getElementById('sendBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            responseDiv.style.display = 'block';
            responseDiv.className = 'loading';
            responseDiv.textContent = 'Loading';
            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';

            try {
                const response = await fetch('/agent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptInput.value })
                });

                const data = await response.json();

                if (response.ok) {
                    responseDiv.className = '';
                    responseDiv.textContent = data.response;
                } else {
                    responseDiv.className = 'error';
                    responseDiv.textContent = 'Error: ' + (data.detail || 'Unknown error');
                }
            } catch (error) {
                responseDiv.className = 'error';
                responseDiv.textContent = 'Error: ' + error.message;
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
            }
        });
    </script>
</body>
</html>
